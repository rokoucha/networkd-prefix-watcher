name: Build

on:
  workflow_dispatch:
    inputs:
      push:
        description: Create a GitHub release
        type: boolean
        required: false
        default: false
      version_tag:
        description: Release version tag used for artifacts
        type: string
        required: false
  workflow_call:
    inputs:
      push:
        description: Create a GitHub release
        type: boolean
        required: false
        default: false
      version_tag:
        description: Release version tag used for artifacts
        type: string
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - GOOS: linux
            GOARCH: amd64
          - GOOS: linux
            GOARCH: arm64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -trimpath -ldflags="-s -w" -o "./${OUTPUT_NAME}" ./cmd/networkd-prefix-watcher
        env:
          CGO_ENABLED: "0"
          GOARCH: ${{ matrix.GOARCH }}
          GOOS: ${{ matrix.GOOS }}
          OUTPUT_NAME: networkd-prefix-watcher-${{ matrix.GOOS }}-${{ matrix.GOARCH }}

      - name: Upload build result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: networkd-prefix-watcher-${{ inputs.version_tag != '' && format('{0}-', inputs.version_tag) || '' }}${{ matrix.GOOS }}-${{ matrix.GOARCH }}
          path: networkd-prefix-watcher-${{ matrix.GOOS }}-${{ matrix.GOARCH }}

  release:
    if: inputs.push && inputs.version_tag != ''
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: networkd-prefix-watcher-${{ inputs.version_tag }}-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum networkd-prefix-watcher-* > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          gh release create "$VERSION_TAG" dist/networkd-prefix-watcher-* dist/SHA256SUMS \
            --generate-notes \
            --latest \
            --target "$GITHUB_SHA" \
            --title "$VERSION_TAG"
